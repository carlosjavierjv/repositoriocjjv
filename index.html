<!DOCTYPE html>
<html>
<head>

<body>
  <h1>CLIENTE <span id="username"></span></h1>

    const user = tg.initDataUnsafe?.user;
    document.getElementById('username').textContent = user?.first_name || 'Usuario';

    document.getElementById('btn').addEventListener('click', () => {
      // Envía datos de vuelta al bot y cierra la app
      tg.sendData(JSON.stringify({ action: 'button_clicked', userId: user?.id }));
fetch('https://remiss-ismael-moonshiny.ngrok-free.dev/api/v1/miniapp/datos', {
    method: 'POST',
    headers: { 
        'Content-Type': 'application/json',
        'ngrok-skip-browser-warning': 'true'   // <-- esto es clave
    },
    body: JSON.stringify({
        chatId: tg.initDataUnsafe?.user?.id,
        campo1: "valor1"
    })
}).then(res => res.json())
  .then(data => console.log(data));
