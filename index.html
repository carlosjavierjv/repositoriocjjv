<!-- index.html -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <h1>Hola, <span id="username"></span></h1>
  <text id="txtNombre">Nombre </text>
  <input type='text' id='nombre' name='nombre'> 
  <button id="btn">Enviar datos al bot</button>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();

    // Datos del usuario de Telegram
    const user = tg.initDataUnsafe?.user;
    document.getElementById('username').textContent = user?.first_name || 'Usuario';

    document.getElementById('btn').addEventListener('click', () => {
      // Envía datos de vuelta al bot y cierra la app
      tg.sendData(JSON.stringify({ action: 'button_clicked', userId: user?.id }));
    });
  </script>
</body>
</html>
